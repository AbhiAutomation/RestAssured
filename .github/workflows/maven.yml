
name: RestAssured Java CI with Maven

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: 00 18 * * *  
    - cron: 00 3  * * *  
    

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      issues: write

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Execute Tests
      run: mvn clean test -Dtestng=testng
      working-directory: api-automation

    - name: Show files
      run: ls -R

    - name: Upload a  Test Result Build Artifact
      if: always()
      uses: actions/upload-artifact@v7.0.0
      with:
        name: logs
        path: api-automation/logs/
        
    - name: Publish Test Report
      if: always()
      uses: dorny/test-reporter@v1
      with:
        name: TestNG Results
        path: api-automation/target/surefire-reports/junitreports/TEST-*.xml
        reporter: java-junit


        
